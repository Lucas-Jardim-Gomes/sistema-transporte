<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div id="login-container">
        <h1>RotaSegura</h1>

        <form>
            <label for="email">Email:</label>     <br>

            <input type="email" id="email" name="username" required placeholder="Digite seu e-mail">   <br>

            <label for="password">Senha:</label>    <br>

            <input type="password" id="password" name="password" required placeholder="Digite sua senha">  <br>

            <button type="submit">Entrar</button>    <br>

            <a href="#">Esqueci minha senha</a>  <br>

            <a href="#">Criar conta</a>
      
        </form>

         <div id="social-login">
                    <p>Ou entre com:</p>

                <button type="button">Entrar com Google</button>  <br>

                </div>
    </div>
</body>
</html>
